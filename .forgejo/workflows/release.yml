name: Build

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - "**/.gitignore"
      - "**/LICENSE"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - "**/.gitignore"
      - "**/LICENSE"

env:
  BUILD_NUMBER: ${{ github.run_number }}
  PROJECT_PATH: "WeaponPaints.csproj"
  PROJECT_NAME: "WeaponPaints"
  OUTPUT_PATH: "./WeaponPaints"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release -o ${{ env.OUTPUT_PATH }}

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release -o ${{ env.OUTPUT_PATH }}

      - name: Clean CounterStrikeSharp references
        run: |
          rm -f \
            ${{ env.OUTPUT_PATH }}/CounterStrikeSharp.API.dll \
            ${{ env.OUTPUT_PATH }}/McMaster.NETCore.Plugins.dll \
            ${{ env.OUTPUT_PATH }}/Microsoft.DotNet.PlatformAbstractions.dll \
            ${{ env.OUTPUT_PATH }}/Microsoft.Extensions.DependencyModel.dll

      - name: Prepare release structure
        run: |
          PLUGIN_DIR="staging/addons/counterstrikesharp/plugins/${{ env.PROJECT_NAME }}"
          mkdir -p "$PLUGIN_DIR"

          # Remove gamedata from build output so it doesn't end up in plugin folder
          rm -rf ${{ env.OUTPUT_PATH }}/gamedata

          cp -r ${{ env.OUTPUT_PATH }}/* "$PLUGIN_DIR/"

          if [ -d "gamedata" ]; then
            cp -r gamedata staging/addons/counterstrikesharp/
          fi

      - name: Create release zip
        run: |
          cd staging
          zip -r "../${{ env.PROJECT_NAME }}.zip" .
          cd ..

      - name: Create Forgejo release
        run: |
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "build-${{ env.BUILD_NUMBER }}",
              "name": "Build ${{ env.BUILD_NUMBER }}",
              "body": "Extract into game/csgo/ — plugin lands in addons/counterstrikesharp/plugins/${{ env.PROJECT_NAME }}"
            }' \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" | jq -r '.id')

          echo "Created release ID: $RELEASE_ID"

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${{ env.PROJECT_NAME }}.zip" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${{ env.PROJECT_NAME }}.zip"
