name: Build

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - "**/.gitignore"
      - "**/LICENSE"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/README.md"
      - "**/.gitignore"
      - "**/LICENSE"

env:
  BUILD_NUMBER: ${{ github.run_number }}
  PROJECT_PATH: "WeaponPaints.csproj"
  PROJECT_NAME: "WeaponPaints"
  OUTPUT_PATH: "./WeaponPaints"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y zip jq curl

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release -o ${{ env.OUTPUT_PATH }}

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y zip jq curl

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release -o ${{ env.OUTPUT_PATH }}

      - name: Clean CounterStrikeSharp references
        run: |
          rm -f \
            ${{ env.OUTPUT_PATH }}/CounterStrikeSharp.API.dll \
            ${{ env.OUTPUT_PATH }}/McMaster.NETCore.Plugins.dll \
            ${{ env.OUTPUT_PATH }}/Microsoft.DotNet.PlatformAbstractions.dll \
            ${{ env.OUTPUT_PATH }}/Microsoft.Extensions.DependencyModel.dll

      - name: Prepare release structure
        run: |
          PLUGIN_DIR="staging/addons/counterstrikesharp/plugins/${{ env.PROJECT_NAME }}"
          mkdir -p "$PLUGIN_DIR"

          # Remove gamedata from build output so it doesn't end up in plugin folder
          rm -rf ${{ env.OUTPUT_PATH }}/gamedata

          cp -r ${{ env.OUTPUT_PATH }}/* "$PLUGIN_DIR/"

          if [ -d "gamedata" ]; then
            cp -r gamedata staging/addons/counterstrikesharp/
          fi

      - name: Create release zip (via Python)
        run: |
          python3 -c "import shutil; shutil.make_archive('${{ env.PROJECT_NAME }}', 'zip', 'staging')"
          # This creates ${{ env.PROJECT_NAME }}.zip from the contents of the staging folder

      - name: Create Release and Upload Asset
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          TAG="build-${BUILD_NUMBER}"
          ZIP="./${PROJECT_NAME}.zip"

          RELEASE_RESPONSE=$(curl -sS -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag "$TAG" \
              --arg name "Build ${BUILD_NUMBER}" \
              --arg body "Extract into game/csgo/ - plugin lands in addons/counterstrikesharp/plugins/${PROJECT_NAME}" \
              --arg target "${GITHUB_SHA}" \
              '{tag_name:$tag, name:$name, body:$body, target_commitish:$target}')" \
            "${API}/releases")

          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Failed to create release:"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi

          curl -sS -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -F "attachment=@${ZIP}" \
            "${API}/releases/${RELEASE_ID}/assets?name=${PROJECT_NAME}.zip"
